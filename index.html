<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cashflow Game</title>
  </head>
  <body>
    <div id="root">
      <div style="background: #0A0A0F; height: 100vh; width: 100vw; display: flex; align-items: center; justify-content: center; font-family: sans-serif; color: #D4AF37;">
        <div style="text-align: center;">
          <h1 style="font-size: 2rem; letter-spacing: 4px; margin-bottom: 1rem; animation: pulse 2s infinite;">CASHFLOW</h1>
          <p style="opacity: 0.6; font-size: 0.8rem;">LOADING FINANCIAL ENGINE...</p>
        </div>
      </div>
      <style>
        @keyframes pulse {
          0%, 100% { opacity: 1; transform: scale(1); }
          50% { opacity: 0.5; transform: scale(0.98); }
        }
      </style>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
